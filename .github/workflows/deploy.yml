name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: # Run manually from Actions tab; choose any branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v4.3.3
        with:
          versionSpec: '6.x'

      - name: Get version (GitVersion)
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.3
        with:
          targetPath: ${{ github.workspace }}
          configFilePath: ${{ github.workspace }}/GitVersion.yml

      - name: Set version env
        run: |
          # Use Major.Minor.CommitsSinceVersionSource (e.g. 0.1.15) instead of SemVer (0.1.0-15)
          PATCH="${{ steps.gitversion.outputs.GitVersion_CommitsSinceVersionSource }}"
          echo "VITE_APP_VERSION=${{ steps.gitversion.outputs.GitVersion_Major }}.${{ steps.gitversion.outputs.GitVersion_Minor }}.${PATCH:-0}" >> $GITHUB_ENV
          echo "VITE_GIT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_APP_VERSION=${{ env.VITE_APP_VERSION }}
            VITE_GIT_SHA=${{ env.VITE_GIT_SHA }}
            VITE_PARTYKIT_HOST=${{ secrets.VITE_PARTYKIT_HOST }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy-partykit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx partykit deploy --token $PARTYKIT_TOKEN
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
